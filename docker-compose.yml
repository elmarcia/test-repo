name: opscrew-continuity

services:
  web:
    build:
      context: .
      dockerfile: src/web/ops-crew-continuity-web/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - core-api
    networks:
      - opscrew

  core-api:
    build:
      context: .
      dockerfile: src/api/OpsCrew.Continuity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=opscrew_continuity;Username=opscrew;Password=opscrew_dev_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opscrew

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opscrew_continuity
      POSTGRES_USER: opscrew
      POSTGRES_PASSWORD: opscrew_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opscrew -d opscrew_continuity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opscrew

networks:
  opscrew:
    driver: bridge

volumes:
  postgres_data:
