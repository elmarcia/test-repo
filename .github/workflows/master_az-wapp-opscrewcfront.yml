name: Build and deploy Angular app to Azure Web App - az-wapp-opscrewcfront

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm install and build
        working-directory: src/web/ops-crew-continuity-web
        run: |
          npm install
          npm run build

      - name: Prepare deploy package
        working-directory: src/web/ops-crew-continuity-web
        run: |
          mkdir deploy
          cp -R dist/ops-crew-continuity-web/browser/* deploy/
          cat > deploy/package.json <<'EOF'
          {
            "scripts": {
              "start": "npx serve -s . -l 8080"
            },
            "dependencies": {
              "serve": "^14.2.4"
            }
          }
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: src/web/ops-crew-continuity-web/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_12082CC7EE1F48AEADB4994DFCF991BF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9BB6049721E4470D976236F89CFD4A0A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_01F98BFEC1EA47FAB6DE2C785A1CC109 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'az-wapp-opscrewcfront'
          package: .
